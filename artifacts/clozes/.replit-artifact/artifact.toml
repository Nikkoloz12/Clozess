kind = "web"
previewPath = "/"
title = "Clozes — AI Fashion Tech"
version = "1.0.0"
id = "artifacts/clozes"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26008

[services.development]
run = "pnpm --filter @workspace/clozes run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clozes", "run", "build" ]
publicDir = "artifacts/clozes/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26008"
BASE_PATH = "/"
